model:
  checkpoint: usyd-community/vitpose-base-simple
  #variant: baseline
  variant: tipt_cross_attention
  fusion: cross_attention
  structural_view: sobel
  shape_depth: 4
  shape_dropout: 0.0
  alpha_init: 0.1
  mlp_ratio: 4
  num_heads:
  dataset_index:

data:
  train_image_dir: coco/train2017
  val_image_dir: coco/val2017
  train_annotations: coco/annotations/person_keypoints_train2017.json
  val_annotations: coco/annotations/person_keypoints_val2017.json
  input_size: [256, 192]
  heatmap_size: [64, 48]
  sigma: 2.0
  bbox_padding: 1.25
  skip_empty: true
  train_max_samples:
  val_max_samples:
  obfuscation_seed: 0
  train_obfuscation:
    mode: blur
    blur_kernel_size: [3, 17]
    probability: 0.7
    pixel_size: 8
  val_obfuscation:
    mode: blur
    blur_kernel_size: 11
    pixel_size: 8

training:
  device: auto
  output_dir: runs/tipt_vitpose
  run_name:
  summary_file: summary.json
  final_coco_eval: true
  epochs: 5
  freeze_pretrained_epochs: 2
  batch_size: 32
  eval_batch_size: 32
  num_workers: 4
  new_lr: 0.0001
  pretrained_lr: 0.00001
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_every: 25

eval:
  device: auto
  batch_size: 32
  num_workers: 4
  pck_threshold: 0.05
