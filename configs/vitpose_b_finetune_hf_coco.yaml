model:
  checkpoint: usyd-community/vitpose-base-simple
  variant: baseline
  dataset_index:

data:
  train_image_dir: coco/train2017
  val_image_dir: coco/val2017
  train_annotations: coco/annotations/person_keypoints_train2017.json
  val_annotations: coco/annotations/person_keypoints_val2017.json
  input_size: [256, 192]
  heatmap_size: [64, 48]
  crop_method: vitpose
  sigma: 2.0
  bbox_padding: 1.25
  skip_empty: true
  train_max_samples:
  val_max_samples:
  obfuscation_seed: 0
  train_obfuscation:
    mode: random
    modes: [blur, pixelate]
    probability: 1.0
    blur_kernel_size: [3, 17]
    pixel_size: [4, 12]
  val_obfuscation:
    mode: blur
    blur_kernel_size: 11
    pixel_size: 8

training:
  device: auto
  output_dir: runs/vitpose_b_finetune
  run_name: vitpose_b_finetune_obfuscated
  summary_file: summary.json
  final_coco_eval: true
  epochs: 5
  batch_size: 16
  eval_batch_size: 32
  num_workers: 4
  pretrained_lr: 0.00001
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_every: 25
  invariance:
    enabled: false
    mode: cosine
    weight: 0.0

eval:
  device: auto
  batch_size: 32
  num_workers: 4
  pck_threshold: 0.05
  decode: hf
  dark_kernel_size: 11
