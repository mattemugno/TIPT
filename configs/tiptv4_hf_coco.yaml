model:
  checkpoint: usyd-community/vitpose-base-simple
  variant: tiptv4
  structural_channels: [sobel_x, sobel_y, magnitude]
  stem_channels: 48
  stem_depth: 3
  shape_depth: 3
  limb_depth: 2
  keypoint_depth: 2
  graph_depth: 2
  shape_dropout: 0.0
  gate_init: 0.1
  pose_gate_init: 0.05
  residual_heatmap_init: 0.05
  mlp_ratio: 4
  num_keypoints: 17
  num_heads:
  dataset_index:

data:
  train_image_dir: coco/train2017
  val_image_dir: coco/val2017
  train_annotations: coco/annotations/person_keypoints_train2017.json
  val_annotations: coco/annotations/person_keypoints_val2017.json
  input_size: [256, 192]
  heatmap_size: [64, 48]
  crop_method: vitpose
  sigma: 2.0
  bbox_padding: 1.25
  skip_empty: true
  train_max_samples:
  val_max_samples:
  obfuscation_seed: 0
  train_obfuscation:
    mode: none
    blur_kernel_size: 11
    pixel_size: 8
  train_invariance_views:
    enabled: true
    view_a:
      mode: blur
      blur_kernel_size: [3, 17]
    view_b:
      mode: pixelate
      pixel_size: [4, 12]
  val_obfuscation:
    mode: blur
    blur_kernel_size: 11
    pixel_size: 8

training:
  device: auto
  output_dir: runs/tiptv4
  run_name: tiptv4
  summary_file: summary.json
  final_coco_eval: true
  trainable: all
  epochs: 5
  freeze_pretrained_epochs: 1
  batch_size: 16
  eval_batch_size: 16
  num_workers: 4
  new_lr: 0.0001
  pretrained_lr: 0.00001
  weight_decay: 0.05
  grad_clip_norm: 1.0
  log_every: 25
  invariance:
    enabled: true
    mode: cosine
    weight: 0.05

eval:
  device: auto
  batch_size: 16
  num_workers: 4
  pck_threshold: 0.05
  decode: hf
  dark_kernel_size: 11
